
spring.application.name=AI Ticketing System

# ==========================
# Server
# ==========================
server.port=8080

# ==========================
# MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/ai_ticketing
spring.datasource.username=root
spring.datasource.password=hello23sql

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# ==========================
# Logging
# ==========================
logging.level.org.springframework.security=INFO

jwt.secret=MzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
jwt.expiration=86400000

# ==========================
# Spring AI Groq (OpenAI Compatible)
# ==========================
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# ==========================
# Spring AI Qdrant Vector Store
# ==========================
# host must be hostname only — no https:// prefix (gRPC client parses host + port separately)
spring.ai.vectorstore.qdrant.host=e55f39a2-89fc-4754-a9a7-9e43fd347505.eu-west-1-0.aws.cloud.qdrant.io
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY}
spring.ai.vectorstore.qdrant.collection-name=tickets
spring.ai.vectorstore.qdrant.use-tls=true
spring.ai.vectorstore.qdrant.initialize-schema=true